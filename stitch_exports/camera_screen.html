<script>
    // Micro-interaction for flash toggle
    const flashBtn = document.getElementById('flash-toggle');
    let flashOn = true;
    flashBtn.addEventListener('click', () => {
      flashOn = !flashOn;
      const icon = flashBtn.querySelector('.material-symbols-outlined');
      icon.textContent = flashOn ? 'flash_on' : 'flash_off';
      flashBtn.classList.toggle('text-white', flashOn);
      flashBtn.classList.toggle('text-white/50', !flashOn);
    });

    // Shutter button logic (visual feedback)
    const shutter = document.querySelector('.relative.w-20.h-20');
    shutter.addEventListener('click', () => {
      const flashLayer = document.createElement('div');
      flashLayer.className = 'fixed inset-0 bg-white z-[100] opacity-0 pointer-events-none transition-opacity duration-150';
      document.body.appendChild(flashLayer);
      
      setTimeout(() => flashLayer.style.opacity = '1', 50);
      setTimeout(() => flashLayer.style.opacity = '0', 200);
      setTimeout(() => flashLayer.remove(), 400);
    });
  </script>
