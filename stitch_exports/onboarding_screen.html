<!-- Micro-interaction logic -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const button = document.querySelector('button');
            
            // Add a subtle parallax effect on mouse/tilt
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 40;
                const y = (window.innerHeight / 2 - e.pageY) / 40;
                const illustration = document.querySelector('.animate-float');
                if(illustration) {
                    illustration.style.transform = `translate(${x}px, ${y}px)`;
                }
            });

            // Smooth reveal animation
            const mainContent = document.querySelector('main');
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                mainContent.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
